
<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>کارت بانکی</title>

    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Vazirmatn',sans-serif;
        }

        body{

            min-height:100vh;

            display:flex;
            justify-content:center;
            align-items:center;

            background:
            linear-gradient(135deg,#0f5132,#178d57,#7fd8aa);

            padding:20px;

        }

        .card{

            width:360px;
            max-width:100%;

            border-radius:24px;

            padding:25px;

            color:#fff;

            position:relative;

            overflow:hidden;

            background:
            linear-gradient(135deg,#0f7d4b,#15915b);

            box-shadow:
            0 25px 50px rgba(0,0,0,.35);

        }

        .card::before{

            content:"";

            position:absolute;

            width:250px;
            height:250px;

            border-radius:50%;

            background:rgba(255,255,255,.08);

            top:-120px;
            left:-80px;

        }

        .bank{

            display:flex;

            justify-content:space-between;

            align-items:center;

            margin-bottom:25px;

        }

        .bank-name{

            font-size:22px;

            font-weight:700;

        }

        .chip{

            width:55px;
            height:42px;

            border-radius:8px;

            background:linear-gradient(#f6d87c,#c89d28);

        }

        .number{

            margin-top:30px;

            font-size:25px;

            letter-spacing:3px;

            text-align:center;

            font-weight:600;

        }

        .owner{

            margin-top:25px;

            font-size:18px;

            font-weight:500;

        }

        .sheba{

            margin-top:20px;

            font-size:14px;

            line-height:28px;

            direction:ltr;

            word-break:break-all;

        }
        /* ---------- دکمه‌های عملیات ---------- */

.actions{
    margin-top:30px;
    display:flex;
    flex-direction:column;
    gap:12px;
}

.btn{
    width:100%;
    border:none;
    border-radius:14px;
    padding:14px;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
    transition:.3s;
}

.copy-card{
    background:#ffffff;
    color:#0f7d4b;
}

.copy-sheba{
    background:#dff6ea;
    color:#0f5132;
}

.share{
    background:#0d3f29;
    color:#fff;
}

.btn:hover{
    transform:translateY(-2px);
    box-shadow:0 8px 20px rgba(0,0,0,.25);
}

.btn:active{
    transform:scale(.98);
}

/* ---------- پیام کپی ---------- */

.toast{

    position:fixed;

    bottom:25px;

    left:50%;

    transform:translateX(-50%);

    background:#222;

    color:#fff;

    padding:12px 22px;

    border-radius:12px;

    opacity:0;

    transition:.4s;

    z-index:1000;

}

.toast.show{

    opacity:1;

}

/* ---------- انیمیشن ورود کارت ---------- */

.card{

    animation:showCard .8s ease;

}

@keyframes showCard{

    from{

        opacity:0;

        transform:translateY(35px) scale(.95);

    }

    to{

        opacity:1;

        transform:translateY(0) scale(1);

    }

}

/* ---------- موبایل ---------- */

@media(max-width:420px){

.card{

    width:100%;

}

.number{

    font-size:22px;

}

.bank-name{

    font-size:20px;

}

}

    </style>

</head>

<body>

<div class="card">

<div class="bank">

<div class="bank-name">
بانک مهر ایران
</div>

<div class="chip"></div>

</div>

<div class="number" id="cardNumber"></div>

<div class="owner"></div>

<div class="sheba" id="sheba"></div>
<div class="actions">

    <button class="btn copy-card" id="copyCardBtn">
        📋 کپی شماره کارت
    </button>

    <button class="btn copy-sheba" id="copyShebaBtn">
        📋 کپی شماره شبا
    </button>

    <button class="btn share" id="shareBtn">
        🔗 اشتراک‌گذاری کارت
    </button>

</div>

<div class="toast" id="toast">
    کپی شد ✅
</div>
<script>

// ===============================
// اطلاعات اصلی کارت (گلوبال)
// ===============================

const CARD_INFO = {

    owner: "محمد مهدی عمونبی",

    bank: "بانک مهر ایران",

    card: "6063731193290732",

    sheba: "IR790600301579816925153001"

};


// ===============================
// نمایش اطلاعات
// ===============================

document.title = "کارت بانکی " + CARD_INFO.owner;

document.querySelector(".bank-name").textContent =
    CARD_INFO.bank;

document.querySelector(".owner").textContent =
    CARD_INFO.owner;

document.getElementById("cardNumber").textContent =
    formatCard(CARD_INFO.card);

document.getElementById("sheba").textContent =
    formatSheba(CARD_INFO.sheba);


// ===============================
// فرمت نمایش
// ===============================

function formatCard(number){

    return number.replace(
        /(\d{4})(?=\d)/g,
        "$1 "
    );

}


function formatSheba(number){

    return number.replace(
        /(.{4})/g,
        "$1 "
    ).trim();

}


// ===============================
// پیام
// ===============================

const toast = document.getElementById("toast");


function showToast(text){

    toast.innerText = text;

    toast.classList.add("show");


    setTimeout(()=>{

        toast.classList.remove("show");

    },1800);

}


// ===============================
// کپی شماره کارت
// ===============================

document.getElementById("copyCardBtn").onclick = function(){

    navigator.clipboard.writeText(
        CARD_INFO.card
    );

    showToast("✅ شماره کارت کپی شد");

};


// ===============================
// کپی شماره شبا
// ===============================

document.getElementById("copyShebaBtn").onclick = function(){

    navigator.clipboard.writeText(
        CARD_INFO.sheba
    );

    showToast("✅ شماره شبا کپی شد");

};


// ===============================
// اشتراک گذاری
// ===============================

document.getElementById("shareBtn").onclick = async function(){


    if(navigator.share){


        await navigator.share({

            title:
            "کارت بانکی " + CARD_INFO.owner,


            text:
            CARD_INFO.bank +
            "\n" +
            CARD_INFO.owner,


            url:
            window.location.href

        });


    }else{


        navigator.clipboard.writeText(
            window.location.href
        );

        showToast("🔗 لینک کپی شد");

    }

};

</script>
</div>

</body>

</html>
