<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>کارت‌های بانکی</title>

<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;600;700&display=swap" rel="stylesheet">


<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Vazirmatn',sans-serif;
}


body{

    min-height:100vh;

    background:
    linear-gradient(135deg,#0f5132,#178d57,#7fd8aa);

    padding:20px;

}


#cards{

    display:flex;

    flex-direction:column;

    align-items:center;

    gap:.card{

    width:360px;
    max-width:100%;

    border-radius:24px;

    padding:25px;

    color:#fff;

    position:relative;

    overflow:hidden;

    box-shadow:
    0 25px 50px rgba(0,0,0,.35);

}


.bank{

    display:flex;

    justify-content:space-between;

    align-items:center;

}


.bank img{

    width:45px;

    height:45px;

    object-fit:contain;

}


.bank-name{

    font-size:22px;

    font-weight:700;

}


.number{

    margin-top:30px;

    text-align:center;

    font-size:24px;

    letter-spacing:3px;

}


.owner{

    margin-top:25px;

    font-size:18px;

}


.sheba{

    margin-top:20px;

    direction:ltr;

    font-size:14px;

}


.actions{

    margin-top:25px;

}


button{

    width:100%;

    padding:12px;

    border:0;

    border-radius:12px;

    margin-top:10px;

    cursor:pointer;

    font-size:15px;

}


.copy{

    background:white;

    color:#0f7d4b;

}


.toast{

    position:fixed;

    bottom:25px;

    left:50%;

    transform:translateX(-50%);

    background:#222;

    color:white;

    padding:12px 20px;

    border-radius:10px;

    opacity:0;

}


.toast.show{

    opacity:1;

}

</style>

</head>


<body>


<

<div class="card"
style="background:linear-gradient(135deg,${card.color1},${card.color2})">
<div class="toast" id="toast">
کپی شد ✅
</div>



<script src="config.js"></script>


<script>


const container =
document.getElementById("cards");


const toast =
document.getElementById("toast");



function formatCard(number){

    return number.replace(
        /(\d{4})(?=\d)/g,
        "$1 "
    );

}


function formatSheba(number){

    return number.replace(
        /(.{4})/g,
        "$1 "
    ).trim();

}



function showToast(text){

    toast.innerText=text;

    toast.classList.add("show");


    setTimeout(()=>{

        toast.classList.remove("show");

    },1500);

}




CARDS.forEach((card,index)=>{


container.innerHTML += `


<div class="card">


<div class="bank">

<div class="bank-name">
${card.bank}
</div>

<img src="${card.bankLogo}">

</div>


<div class="number">
${formatCard(card.card)}
</div>


<div class="owner">
${card.owner}
</div>


<div class="sheba">
${formatSheba(card.sheba)}
</div>


<div class="actions">


<button class="copy" onclick="copyCard('${card.card}')">

📋 کپی شماره کارت

</button>


<button class="copy" onclick="copyCard('${card.sheba}')">

📋 کپی شماره شبا

</button>


</div>


</div>


`;

});




function copyCard(value){


navigator.clipboard.writeText(value);


showToast("✅ کپی شد");


}


</script>


</body>

</html>
